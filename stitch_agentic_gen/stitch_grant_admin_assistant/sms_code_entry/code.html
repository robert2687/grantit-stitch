<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 flex items-center justify-between px-6 py-4 bg-[#f6f3f5] dark:bg-slate-900 transition-colors">
<div class="flex items-center gap-4">
<button class="hover:bg-[#e4e2e4] dark:hover:bg-slate-800 transition-colors p-2 rounded-lg flex items-center justify-center active:opacity-80 duration-150">
<span class="material-symbols-outlined text-[#131b2e] dark:text-slate-100" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-[#131b2e] dark:text-slate-100">Security Setup</h1>
</div>
<div class="hidden md:flex items-center gap-6">
<span class="font-headline font-extrabold text-[#131b2e] dark:text-white">RMD26</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12 md:py-24">
<div class="w-full max-w-xl">
<!-- Central Work Surface -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_12px_40px_rgba(19,27,46,0.06)] p-8 md:p-12 relative overflow-hidden">
<!-- Editorial Header -->
<div class="mb-10 text-center md:text-left">
<h2 class="font-headline text-3xl md:text-4xl font-extrabold text-primary-container tracking-tight mb-4">Enter Code</h2>
<p class="font-body text-on-primary-container leading-relaxed">
                        We've sent a 6-digit code to your mobile number ending in <span class="font-semibold text-primary-container tracking-widest">•••• 5678</span>.
                    </p>
</div>
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-2 md:gap-4 mb-10">
<input class="w-full aspect-square text-center font-headline text-2xl font-bold bg-surface-container-low border-b-2 border-outline-variant/20 focus:border-secondary focus:bg-surface-container-lowest transition-all outline-none rounded-lg" maxlength="1" placeholder="·" type="text"/>
<input class="w-full aspect-square text-center font-headline text-2xl font-bold bg-surface-container-low border-b-2 border-outline-variant/20 focus:border-secondary focus:bg-surface-container-lowest transition-all outline-none rounded-lg" maxlength="1" placeholder="·" type="text"/>
<input class="w-full aspect-square text-center font-headline text-2xl font-bold bg-surface-container-low border-b-2 border-outline-variant/20 focus:border-secondary focus:bg-surface-container-lowest transition-all outline-none rounded-lg" maxlength="1" placeholder="·" type="text"/>
<input class="w-full aspect-square text-center font-headline text-2xl font-bold bg-surface-container-low border-b-2 border-outline-variant/20 focus:border-secondary focus:bg-surface-container-lowest transition-all outline-none rounded-lg" maxlength="1" placeholder="·" type="text"/>
<input class="w-full aspect-square text-center font-headline text-2xl font-bold bg-surface-container-low border-b-2 border-outline-variant/20 focus:border-secondary focus:bg-surface-container-lowest transition-all outline-none rounded-lg" maxlength="1" placeholder="·" type="text"/>
<input class="w-full aspect-square text-center font-headline text-2xl font-bold bg-surface-container-low border-b-2 border-outline-variant/20 focus:border-secondary focus:bg-surface-container-lowest transition-all outline-none rounded-lg" maxlength="1" placeholder="·" type="text"/>
</div>
<!-- Status Indicators -->
<div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-12">
<div class="flex items-center gap-2 px-4 py-2 bg-secondary-fixed/30 rounded-full">
<span class="material-symbols-outlined text-on-secondary-fixed-variant text-sm" data-icon="timer">timer</span>
<span class="font-label text-xs font-semibold uppercase tracking-wider text-on-secondary-fixed-variant">Code expires in 04:59</span>
</div>
<button class="text-on-primary-container text-sm font-medium hover:text-primary-container transition-colors disabled:opacity-40" disabled="">
                        Resend Code in 0:30
                    </button>
</div>
<!-- Primary Action -->
<button class="w-full py-4 bg-primary-container text-on-primary font-headline font-bold text-lg rounded-lg shadow-lg hover:shadow-xl transition-all active:scale-[0.98] bg-gradient-to-r from-primary-container to-on-primary-fixed-variant">
                    Verify &amp; Continue
                </button>
<!-- Layered Background Accent (Decorative) -->
<div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 bg-surface-container-high rounded-full opacity-30"></div>
</div>
<!-- Security Footer -->
<footer class="mt-8 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-outline text-lg" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label text-[10px] font-bold tracking-[0.2em] text-outline uppercase">End-to-end Encrypted</span>
</footer>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused verification journey as per "Relevance Check" rule) -->
<!-- Sidebar Simulation for Desktop UI check -->
<aside class="hidden lg:fixed left-0 top-0 h-full w-20 bg-surface-container-low flex flex-col items-center py-8 gap-8 border-r border-outline-variant/10">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-white" data-icon="token">token</span>
</div>
<nav class="flex flex-col gap-6">
<div class="w-12 h-12 flex items-center justify-center text-outline hover:bg-surface-container-highest rounded-xl transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
</div>
<div class="w-12 h-12 flex items-center justify-center bg-primary-container text-white rounded-xl shadow-md cursor-pointer">
<span class="material-symbols-outlined" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<div class="w-12 h-12 flex items-center justify-center text-outline hover:bg-surface-container-highest rounded-xl transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
<div class="w-12 h-12 flex items-center justify-center text-outline hover:bg-surface-container-highest rounded-xl transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
</nav>
</aside>
