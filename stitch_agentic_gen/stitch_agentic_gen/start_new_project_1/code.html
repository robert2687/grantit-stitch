<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24
    }.switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #4B5563;transition: .4s;
      border-radius: 34px;
    }
    .dark .slider {
        background-color: #4B5563;}
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #13a4ec;}
    input:checked + .slider:before {
      transform: translateX(16px);
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13a4ec",
            "secondary": "#9013FE",
            "background-light": "#F8F9FA",
            "background-dark": "#1A1A1A",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark font-display group/design-root overflow-x-hidden">
<main class="flex-1 pb-28">
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-gray-800 dark:text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</div>
<h1 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Settings</h1>
<div class="flex size-12 shrink-0 items-center"></div>
</div>
<div class="px-4 py-3 space-y-8">
<div class="space-y-4">
<h2 class="text-gray-500 dark:text-gray-400 text-sm font-bold uppercase tracking-wider px-1">Account Information</h2>
<div class="bg-white dark:bg-black/20 rounded-xl overflow-hidden divide-y divide-gray-200 dark:divide-gray-700">
<a class="flex items-center justify-between p-4 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors" href="#">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-400">mail</span>
<p class="text-gray-900 dark:text-white">Email Address</p>
</div>
<div class="flex items-center gap-2">
<span class="text-gray-500 dark:text-gray-400 text-sm">user@example.com</span>
<span class="material-symbols-outlined text-gray-400 dark:text-gray-500">chevron_right</span>
</div>
</a>
<a class="flex items-center justify-between p-4 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors" href="#">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-400">lock</span>
<p class="text-gray-900 dark:text-white">Change Password</p>
</div>
<span class="material-symbols-outlined text-gray-400 dark:text-gray-500">chevron_right</span>
</a>
</div>
</div>
<div class="space-y-4">
<h2 class="text-gray-500 dark:text-gray-400 text-sm font-bold uppercase tracking-wider px-1">Preferences</h2>
<div class="bg-white dark:bg-black/20 rounded-xl overflow-hidden divide-y divide-gray-200 dark:divide-gray-700">
<a class="flex items-center justify-between p-4 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors" href="#">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-400">notifications</span>
<p class="text-gray-900 dark:text-white">Notifications</p>
</div>
<span class="material-symbols-outlined text-gray-400 dark:text-gray-500">chevron_right</span>
</a>
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-400">dark_mode</span>
<p class="text-gray-900 dark:text-white">Dark Mode</p>
</div>
<label class="switch">
<input checked="true" type="checkbox"/>
<span class="slider"></span>
</label>
</div>
</div>
</div>
<div class="space-y-4">
<h2 class="text-gray-500 dark:text-gray-400 text-sm font-bold uppercase tracking-wider px-1">Billing</h2>
<div class="bg-white dark:bg-black/20 rounded-xl overflow-hidden divide-y divide-gray-200 dark:divide-gray-700">
<a class="flex items-center justify-between p-4 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors" href="#">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-400">credit_card</span>
<p class="text-gray-900 dark:text-white">Manage Subscription</p>
</div>
<span class="material-symbols-outlined text-gray-400 dark:text-gray-500">chevron_right</span>
</a>
</div>
</div>
<div class="pt-4">
<button class="flex h-14 w-full items-center justify-center gap-x-2 rounded-xl bg-gray-200 dark:bg-gray-800 px-6 text-base font-bold text-red-500 dark:text-red-500 transition-colors hover:bg-gray-300 dark:hover:bg-gray-700">
<span class="material-symbols-outlined">logout</span>
                Log Out
            </button>
</div>
</div>
</main>
</div>

</body></html>
